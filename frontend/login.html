<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — SmartCR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="login-pagina">
    <div class="login-card">

        <div class="login-logo">
            <div class="logo-nombre">SmartCR</div>
            <div class="logo-sub">Sistema de Inventario y Ventas</div>
        </div>

        <!-- Mensaje de error -->
        <div class="login-error" id="mensajeError">
            ⚠ <span id="textoError">Correo o contraseña incorrectos.</span>
        </div>

        <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="correo" placeholder="usuario@smartcr.com">
        </div>

        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="contrasena" placeholder="••••••••">
        </div>

        <button class="btn btn-primario w-100" id="btnLogin" style="margin-top:8px; padding:11px; font-size:14px; justify-content:center;">
            Iniciar sesión
        </button>

    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
